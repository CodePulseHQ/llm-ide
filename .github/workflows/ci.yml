name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [ published ]

env:
  PYTHON_VERSION: "3.10"
  POETRY_VERSION: "1.5.1"

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-
          
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        
    - name: Verify installation
      run: |
        python -c "from refactor_mcp import server; print('Package installed successfully')"
        
    - name: Run comprehensive tests
      run: |
        python -m pytest tests/ -v --cov=refactor_mcp --cov-report=xml --cov-report=html
        
    - name: Upload test results
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          htmlcov/
          coverage.xml
          
    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.10'
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  lint-and-format:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/pyproject.toml') }}
        
    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort flake8 mypy bandit safety
        pip install -e .
        
    - name: Check code formatting with Black
      run: black --check --diff refactor_mcp/
      
    - name: Check import sorting with isort
      run: isort --check-only --diff refactor_mcp/
      
    - name: Lint with flake8
      run: flake8 refactor_mcp/ --config=.flake8
      
    - name: Type check with mypy
      run: mypy refactor_mcp/ --ignore-missing-imports
      
    - name: Security check with bandit
      run: bandit -r refactor_mcp/ -f json -o bandit-report.json
      continue-on-error: true
      
    - name: Dependency security check
      run: safety check --json --output safety-report.json
      continue-on-error: true
      
    - name: Upload security reports
      uses: actions/upload-artifact@v6
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          safety-report.json

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: refactor-mcp:test
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Test Docker image
      run: |
        docker run --rm -d --name test-container refactor-mcp:test
        sleep 5
        docker logs test-container
        docker stop test-container

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        
    - name: Test MCP server startup
      run: |
        timeout 10s python -m refactor_mcp.server || true
        echo "MCP server startup test completed"
        
    - name: Test health endpoints
      run: |
        python -c "
        from refactor_mcp.server import health_check, quick_health_status, server_metrics
        import json
        
        # Test health endpoints
        health = json.loads(health_check())
        quick = json.loads(quick_health_status())  
        metrics = json.loads(server_metrics())
        
        assert health['overall_status'] in ['healthy', 'degraded'], f'Unexpected health status: {health[\"overall_status\"]}'
        assert quick['handlers_available'] == 6, f'Expected 6 handlers, got {quick[\"handlers_available\"]}'
        assert metrics['total_languages'] == 6, f'Expected 6 languages, got {metrics[\"total_languages\"]}'
        
        print('✅ All integration tests passed!')
        "
        
    - name: Test all language handlers
      run: |
        python -c "
        from refactor_mcp.languages import list_supported_languages, get_handler_by_language
        
        languages = list_supported_languages()
        assert len(languages) == 6, f'Expected 6 languages, got {len(languages)}'
        
        for lang in languages:
            handler = get_handler_by_language(lang)
            assert handler is not None, f'Handler not found for {lang}'
            assert hasattr(handler, 'can_handle_file'), f'Handler {lang} missing can_handle_file method'
            print(f'✅ {lang} handler working correctly')
            
        print('✅ All language handlers working!')
        "

  performance-benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        pip install memory-profiler
        
    - name: Run performance benchmarks
      run: |
        python -c "
        import time
        import tempfile
        from pathlib import Path
        from refactor_mcp.languages import get_handler_for_file
        from refactor_mcp.server import get_code_structure, organize_imports
        
        # Benchmark language detection and structure analysis
        test_files = {
            'Python': ('test.py', 'import os\n\ndef test():\n    return \"hello\"'),
            'JavaScript': ('test.js', 'const fs = require(\"fs\");\n\nfunction test() {\n    return \"hello\";\n}'),
            'TypeScript': ('test.ts', 'interface Test {\n    value: string;\n}\n\nfunction test(): string {\n    return \"hello\";\n}'),
        }
        
        benchmark_results = {}
        
        for lang, (filename, content) in test_files.items():
            with tempfile.NamedTemporaryFile(mode='w', suffix=filename[filename.rfind('.'):], delete=False) as f:
                f.write(content)
                temp_path = f.name
            
            try:
                # Benchmark structure analysis
                start = time.time()
                for _ in range(10):
                    get_code_structure(temp_path)
                duration = (time.time() - start) / 10 * 1000
                
                benchmark_results[lang] = duration
                print(f'{lang}: {duration:.2f}ms average')
                
                # Assert performance requirements
                assert duration < 100, f'{lang} structure analysis too slow: {duration}ms'
                
            finally:
                Path(temp_path).unlink(missing_ok=True)
        
        print('✅ Performance benchmarks passed!')
        print(f'Average performance: {sum(benchmark_results.values())/len(benchmark_results):.2f}ms')
        "

  release:
    name: Build and Release
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [test, lint-and-format, docker-build, integration-tests]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
        
    - name: Build package
      run: python -m build
      
    - name: Upload build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: dist-files
        path: dist/
        
    - name: Publish to PyPI
      if: github.event_name == 'release'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
      run: twine upload dist/*

  docker-release:
    name: Docker Release
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    needs: [test, lint-and-format, docker-build]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: refactor-mcp
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
